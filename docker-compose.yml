version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shopping-backend
    ports:
      - "5000:5000"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=5000
      - DATABASE_DIR=/app/database_dir
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - db-data:/app/database_dir
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: shopping-frontend
    ports:
      - "3000:3000"
    environment:
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=3000
      - BACKEND_URL=http://backend:5000
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - backend
    restart: always

volumes:
  db-data:
